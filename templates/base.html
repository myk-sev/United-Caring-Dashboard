<!DOCTYPE html>
<html>
<head>
    <title>Shelter Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% if user.is_authenticated %}

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Shelter System</span>

        <div>
            <a class="btn btn-light" href="/dashboard/">Dashboard</a>
            <a class="btn btn-light" href="/shelters/">Submit Shift</a>
            <a class="btn btn-light" href="/reports/">Reports</a>
            <form action="/logout/" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Logout</button>
</form>
        </div>
    </div>
</nav>

{% else %}

<!-- LOGIN PROMPT NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Shelter System</span>

        <div>
            <a class="btn btn-success" href="/login/">Login</a>
        </div>
    </div>
</nav>

{% endif %}

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
