{% extends 'base.html' %}

{% block content %}

<style>
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 56px);
    background: #f0f0f0;
  }

  .login-box {
    border: 2px solid #333;
    width: 480px;
    font-family: Arial, sans-serif;
    background: white;
  }

  .login-header {
    background: #222;
    color: white;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    padding: 20px;
  }

  .login-body {
    padding: 30px 40px 40px;
  }

  .login-label {
    display: block;
    text-align: center;
    font-size: 16px;
    margin-bottom: 8px;
  }

  .login-input {
    width: 100%;
    height: 48px;
    border: 2px solid #333;
    font-size: 16px;
    padding: 6px 10px;
    margin-bottom: 24px;
    border-radius: 0;
    box-sizing: border-box;
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: #222;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 8px;
  }

  .login-btn:hover {
    background: #444;
  }
</style>

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-header">UCS Shelter System Login</div>
    <div class="login-body">

      {% if messages %}
        {% for message in messages %}
          <div style="color:darkred; text-align:center; font-weight:bold; margin-bottom:12px;">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <label class="login-label" for="username">Enter User Name</label>
        <input class="login-input" type="text" name="username" id="username" required>

        <label class="login-label" for="password">Enter Password</label>
        <input class="login-input" type="password" name="password" id="password" required>

        <button class="login-btn" type="submit">Login</button>
      </form>

    </div>
  </div>
</div>

{% endblock %}
