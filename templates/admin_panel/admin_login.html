{% extends "base.html" %}
{% block content %}

<style>
  * { box-sizing: border-box; }

  .admin-login-wrap {
    min-height: calc(100vh - 56px);
    background: #7fd3a6;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: #d9d9d9;
    border: 2px solid #555;
    border-radius: 4px;
    padding: 2.5rem 3rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .login-title {
    border: 2px solid #333;
    padding: 0.6rem 1.5rem;
    display: inline-block;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    margin-bottom: 2rem;
    background: #d9d9d9;
  }

  .login-card p {
    font-size: 0.9rem;
    color: #333;
    margin-bottom: 1.25rem;
  }

  .input-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .pw-input {
    width: 240px;
    height: 38px;
    border: 1.5px solid #888;
    border-radius: 2px;
    padding: 0 0.75rem;
    font-size: 1rem;
    background: #fff;
  }

  .pw-input:focus {
    outline: none;
    border-color: #4a6fa5;
    box-shadow: 0 0 0 2px rgba(74,111,165,0.2);
  }

  .btn-go {
    padding: 0.5rem 1.25rem;
    height: 38px;
    background: linear-gradient(180deg, #d0d0d0, #a0a0a0);
    border: 2px solid #888;
    border-radius: 3px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
  }

  .btn-go:hover { background: linear-gradient(180deg, #e0e0e0, #b0b0b0); }
  .btn-go:active { box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3); }

  .error-msg {
    color: #8b0000;
    font-size: 0.85rem;
    font-weight: bold;
    margin-top: 0.5rem;
  }

  .btn-back {
    display: inline-block;
    margin-top: 1.5rem;
    font-size: 0.82rem;
    color: #555;
    text-decoration: none;
    border-bottom: 1px solid #999;
  }

  .btn-back:hover { color: #222; }
</style>

<div class="admin-login-wrap">
  <div class="login-card">

    <div class="login-title">Admin Access</div>

    <p>Enter password and press Go</p>

    <form method="POST">
      {% csrf_token %}
      <div class="input-row">
        <input class="pw-input" type="password" name="admin_password"
               autocomplete="current-password" autofocus>
        <button class="btn-go" type="submit" name="admin_login">Go</button>
      </div>
    </form>

    {% if messages %}
      {% for message in messages %}
        <div class="error-msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <a class="btn-back" href="{% url 'mainscreen' %}">← Back to Main Screen</a>

  </div>
</div>

{% endblock %}
